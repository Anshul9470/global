version: '3.8'

services:
  nginx-reverse:
    image: nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /home/ubuntu/globalb2b-deploy/nginx/conf/:/etc/nginx/conf.d/:ro
      - /home/ubuntu/globalb2b-deploy/certbot/www/:/var/www/certbot/:ro
      - /home/ubuntu/globalb2b-deploy/certbot/conf/:/etc/nginx/ssl/:ro
    networks:
      - node-network
    depends_on:
      - node-app
      - mongodb
    deploy:
     replicas: 1
     restart_policy:
       condition: any

  node-app:
    image: ${DOCKERHUB_USERNAME}/globalb2b-server:${DOCKER_GIT_TAG}
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/globalb2bDb
      - PORT=3000
    ports:
      - '3000:3000'
    depends_on:
      - mongodb
    volumes:
      - /home/ubuntu/globalb2b-deploy/uploads:/usr/src/app/uploads
      - /home/ubuntu/globalb2b-deploy/uploadsprducts:/usr/src/app/products
    networks:
      - node-network
    deploy:
     replicas: 1
     restart_policy:
       condition: any
       delay: 2s

  mongodb:
    image: mongo:7-jammy
    ports:
      - '27017:27017'
    volumes:
      - dbdata6:/data/db
    networks:
      - node-network
    deploy:
     replicas: 1
     restart_policy:
       condition: none


volumes:
  dbdata6:

networks:
  node-network:
    driver: overlay
