server {
    listen 80 default_server;
    listen [::]:80;
    server_name  api.globalb2bmart.in;

    server_tokens off;
    
    access_log /dev/stdout;
    error_log /dev/stderr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://api.globalb2bmart.in$request_uri;
    }
}
server {
    listen 443 default_server ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api.globalb2bmart.in;

    ssl_certificate /etc/nginx/ssl/live/api.globalb2bmart.in/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.globalb2bmart.in/privkey.pem;

    access_log /dev/stdout;
    error_log /dev/stderr;

    location / {
    	proxy_pass http://node-app:3000;
    }
}
